# The runtime authorization gateway — the heart of the prototype.
#
# One pod, two roles:
#   - envoy  = Policy Enforcement Point (PEP): terminates traffic, calls the PDP
#              via ext_authz on every request, forwards only what is allowed.
#   - opa    = Policy Decision Point (PDP): evaluates policy/authz.rego against
#              the request (incl. buffered MCP JSON-RPC body) and returns
#              ALLOW / DENY.
#
# Traffic path:  client → envoy(:8080) → [ext_authz gRPC → opa(:9191)] → mcp-server
# A DENY short-circuits at Envoy with 403; the backend is never touched.
#
# NOTE: the OPA policy ConfigMap (`opa-policy`) is created by deploy.sh from
# policy/authz.rego so the policy has a single source of truth in git.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: zerotrust
data:
  envoy.yaml: |
    admin:
      address:
        socket_address: { address: 127.0.0.1, port_value: 9901 }
    static_resources:
      listeners:
        - name: ingress
          address:
            socket_address: { address: 0.0.0.0, port_value: 8080 }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    codec_type: AUTO
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: mcp
                          domains: ["*"]
                          routes:
                            - match: { prefix: "/" }
                              route: { cluster: mcp_service }
                    http_filters:
                      # PEP → PDP: call OPA on every request, with the body buffered
                      # so the policy can inspect the MCP JSON-RPC payload.
                      - name: envoy.filters.http.ext_authz
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                          transport_api_version: V3
                          with_request_body:
                            max_request_bytes: 8192
                            allow_partial_message: true
                            pack_as_bytes: false
                          grpc_service:
                            google_grpc:
                              target_uri: 127.0.0.1:9191
                              stat_prefix: ext_authz
                            timeout: 1s
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: mcp_service
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: mcp_service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: mcp-server.zerotrust.svc.cluster.local
                          port_value: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: zerotrust
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        # ── PEP ──────────────────────────────────────────────────────────────
        - name: envoy
          image: envoyproxy/envoy:v1.31-latest
          imagePullPolicy: IfNotPresent
          args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 128Mi }
        # ── PDP ──────────────────────────────────────────────────────────────
        - name: opa
          image: openpolicyagent/opa:0.70.0-envoy
          imagePullPolicy: IfNotPresent
          args:
            - "run"
            - "--server"
            - "--log-level=info"
            - "--set=plugins.envoy_ext_authz_grpc.addr=:9191"
            - "--set=plugins.envoy_ext_authz_grpc.path=envoy/authz/allow"
            - "--set=decision_logs.console=true"
            - "/policy/authz.rego"
          ports:
            - containerPort: 9191
          volumeMounts:
            - name: opa-policy
              mountPath: /policy
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 128Mi }
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-config
        - name: opa-policy
          configMap:
            name: opa-policy
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: zerotrust
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
