# agentic-sec threat taxonomy — machine-readable index
#
# schema_version: 1.0.0
# Consumed by: mcpnuke --coverage-report <camazotz-url>
#              nullfield policy generators
#              any tooling that needs a stable lane/transport/threat map
#
# Update policy: this file is generated from camazotz scenario.yaml files.
# When a new lab is added to camazotz, add the corresponding entry here.
# The threat_id, lane, transport, and owasp_mcp fields must match the
# scenario.yaml exactly — these are the cross-repo vocabulary contract.
#
# Source of truth for lane slugs and transport codes: docs/identity-flows.md
# Source of truth for lab implementations: github.com/babywyrm/camazotz

schema_version: "1.0.0"
generated: "2026-05-12"
camazotz_lab_count: 51

# ─────────────────────────────────────────────────────────────────────────────
# Identity Lanes
# ─────────────────────────────────────────────────────────────────────────────
lanes:
  - id: 1
    slug: "human-direct"
    name: "Human Direct"
    description: >
      Human authenticates directly — browser, CLI, desktop app. Token issued
      to the user personally. The human is present and intentional.
    default_nullfield_action: "ALLOW"
    key_risks:
      - Confused deputy (token stolen and replayed)
      - RBAC bypass (role boundaries not enforced at tool layer)
      - Secrets in tool output (credential leakage to the human's session)

  - id: 2
    slug: "delegated"
    name: "Delegated"
    description: >
      Human delegates to an agent. The agent acts on the human's behalf with
      a scoped token derived from the human's authorization grant.
    default_nullfield_action: "HOLD"
    key_risks:
      - Prompt injection (human's intent hijacked by injected content)
      - SSRF via tool (agent calls attacker-controlled URLs)
      - OAuth token theft (delegated token stolen or replayed)
      - AI governance bypass (AI gate bypassed via redirect)
      - Shared IdP pollution (agent mints out-of-scope token)

  - id: 3
    slug: "machine"
    name: "Machine Identity"
    description: >
      Automated service or scheduled job. No human in the loop. Token issued
      to the service principal. Runs unattended.
    default_nullfield_action: "SCOPE"
    key_risks:
      - Supply chain via content (poisoned dependency/document)
      - Bot identity theft (service credential stolen, impersonated)
      - DPoP forgery (key leaked, proof forged)
      - Subprocess credential inheritance (child process inherits service token)

  - id: 4
    slug: "chain"
    name: "Agent Chain"
    description: >
      One agent calls another. Multi-hop orchestration. Each hop introduces
      an identity boundary that most deployments do not enforce.
    default_nullfield_action: "DENY"
    key_risks:
      - Delegation depth escalation (depth N has full human authority)
      - Identity dilution (sub-agent invisible in audit logs)
      - Credential forwarding across transports B/C/D/E

  - id: 5
    slug: "anonymous"
    name: "Anonymous"
    description: >
      Pre-authentication. No identity established. MCP protocol requires
      tools/list to be unauthenticated. Onboarding and guest flows.
    default_nullfield_action: "BUDGET"
    key_risks:
      - Tool schema over-disclosure (credential patterns in descriptions)
      - Rate-limit exhaustion (no per-caller accounting)
      - Pre-auth injection (input stored raw, inherited by session)

# ─────────────────────────────────────────────────────────────────────────────
# Transport Codes
# ─────────────────────────────────────────────────────────────────────────────
transports:
  - code: "A"
    name: "MCP Protocol"
    description: >
      Standard JSON-RPC over SSE/HTTP. tools/call, tools/list, resources/list.
      The default transport — all MCP clients and servers support it.
    identity_boundary: true
    token_reissuance: "depends on gateway config"

  - code: "B"
    name: "Direct API"
    description: >
      Agent-to-agent via direct HTTP REST call. No MCP layer. Bearer token
      forwarded in Authorization header — no fresh issuance by default.
    identity_boundary: false
    token_reissuance: "rarely"

  - code: "C"
    name: "In-Process SDK"
    description: >
      Library function call within the same process. Shared memory.
      No network boundary. Credential cached in process memory.
    identity_boundary: false
    token_reissuance: "never"

  - code: "D"
    name: "Subprocess"
    description: >
      Parent spawns child process. Credential injected via environment
      variable or stdin. Child inherits parent env automatically.
    identity_boundary: true
    token_reissuance: "never"
    note: "Process boundary exists but credential crosses it via env var injection."

  - code: "E"
    name: "Native LLM Function-Calling"
    description: >
      LLM dispatches registered functions. Full conversation context —
      including system prompt credentials — is passed to each function call.
    identity_boundary: false
    token_reissuance: "never"

